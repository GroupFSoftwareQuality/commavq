name: Update Leaderboard Table

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update leaderboard HTML in README files
        run: python scripts/update_leaderboard.py README.md compression/README.md

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --quiet || (git add README.md compression/README.md && git commit -m "ci: update leaderboard tables" && git push)
